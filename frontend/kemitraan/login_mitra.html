<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minton - Login Dashboard Mitra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #000000;
            --bg-card: #1D1D1D;
            --primary-lime: #bdd124;
            --text-white: #ffffff;
            --text-gray: #aaaaaa;
            --input-bg: #111111;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            min-height: 100vh;
        }

        .split-layout {
            display: flex;
            width: 100%;
        }

        .left-side {
            flex: 1.2;
            position: relative;
            background: linear-gradient(to right, rgba(0, 0, 0, 0) 80%, var(--bg-dark) 100%),
                url(../asset/login-dashboard-mitra.png) left/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
        }

        .left-content h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .left-content p {
            font-size: 18px;
            color: #ccc;
            max-width: 500px;
            line-height: 1.6;
        }

        .right-side {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: var(--bg-dark);
        }

        .login-card {
            background-color: var(--bg-card);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .header-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 26px 0;
            z-index: 20;
            pointer-events: none;
        }

        .container-overlay {
            width: 90%;
            max-width: 1600px;
            margin: auto;
            pointer-events: auto;
        }

        .logo-img {
            height: 28px;
        }

        .login-card h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-card p.subtitle {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #eee;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-lime);
            box-shadow: 0 0 0 4px rgba(189, 209, 36, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-lime);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 12px;
        }

        .btn-login:hover {
            background-color: #d4e92a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(189, 209, 36, 0.2);
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .footer-links a {
            color: var(--primary-lime);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 992px) {
            .left-side {
                display: none;
            }

            .right-side {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="header-overlay">
        <div class="container-overlay">
            <a href="../index.html"><img src="../asset/logo.png" alt="Minton Logo" class="logo-img"></a>
        </div>
    </div>
    <div class="split-layout">
        <!-- Sisi Kiri: Pesan Promosi -->
        <div class="left-side">
            <div class="left-content">
            </div>
        </div>

        <!-- Sisi Kanan: Form Login -->
        <div class="right-side">
            <div class="login-card">
                <h2>Login Mitra</h2>
                <p class="subtitle">Silakan masukkan akun pengelola GOR Anda.</p>

                <form action="mitra.html">
                    <div class="form-group">
                        <label>Email Bisnis / ID Mitra</label>
                        <input type="text" placeholder="contoh: gor_sudirman@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Kata Sandi</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <div style="text-align: right; margin-bottom: 24px;">
                        <a href="#" style="color: var(--text-gray); font-size: 13px; text-decoration: none;">Lupa kata
                            sandi?</a>
                    </div>

                    <button type="submit" class="btn-login">Masuk ke Dashboard</button>
                </form>

                <div class="footer-links">
                    <p>Belum bergabung menjadi mitra? <a href="registrasi_lapangan.html">Daftar Sekarang</a></p>
                    <div style="margin-top: 16px;">
                        <a href="../buat akun/login.html" style="color: #666; font-weight: 400; font-size: 13px;"><i
                                class="fa-solid fa-arrow-left"></i> Kembali ke Login Pemain</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
