<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minton - Registrasi Mitra Lapangan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        body {
            background: #000000;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .reg-container {
            width: 90%;
            max-width: 900px;
            margin: 60px auto;
            background: #111111;
            border-radius: 24px;
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .reg-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .reg-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .reg-header p {
            color: #aaa;
            font-size: 16px;
        }

        .reg-body {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #bdd124;
        }

        .section-title i {
            font-size: 18px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #eee;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            background: #1d1d1d;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #bdd124;
            background: #252525;
            box-shadow: 0 0 0 4px rgba(189, 209, 36, 0.1);
        }

        /* Checkbox Tiles */
        .facility-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .facility-item {
            position: relative;
        }

        .facility-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .facility-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #1d1d1d;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .facility-item input:checked+.facility-label {
            border-color: #bdd124;
            background: rgba(189, 209, 36, 0.1);
            color: #bdd124;
        }

        .btn-submit-reg {
            width: 100%;
            padding: 18px;
            background: #bdd124;
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit-reg:hover {
            background: #d4e92a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(189, 209, 36, 0.2);
        }

        @media (max-width: 768px) {
            .grid-inputs {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: span 1;
            }

            .reg-container {
                width: 95%;
                margin: 30px auto;
            }

            .reg-body {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Simple Navbar -->
    <header class="navbar">
        <div class="container nav-wrapper">
            <div class="logo">
                <a href="../index.html"><img src="../asset/logo.png" alt="logo"></a>
            </div>
            <nav>
                <a href="kemitraan.html">Kembali ke Kemitraan</a>
            </nav>
        </div>
    </header>

    <div class="reg-container">
        <div class="reg-header">
            <h1>Daftarkan <span style="color:#bdd124;">GOR Anda</span></h1>
            <p>Lengkapi data di bawah untuk bergabung dalam ekosistem digital Minton.</p>
        </div>

        <div class="reg-body">
            <form action="mitra.html"> <!-- Simulasi Redirect ke Dashboard -->
                
                <!-- Section 1: Informasi Dasar -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="fa-solid fa-building"></i> Informasi GOR
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group">
                            <label>Nama GOR / Lapangan</label>
                            <input type="text" placeholder="Contoh: GOR Sudirman Jaya" required>
                        </div>
                        <div class="form-group">
                            <label>Nama Pemilik / Pengelola</label>
                            <input type="text" placeholder="Nama Lengkap" required>
                        </div>
                        <div class="form-group">
                            <label>Nomor WhatsApp</label>
                            <input type="tel" placeholder="08123456789" required>
                        </div>
                        <div class="form-group">
                            <label>Email Bisnis</label>
                            <input type="email" placeholder="gor@email.com" required>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Lokasi -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="fa-solid fa-location-dot"></i> Detail Lokasi
                    </div>
                    <div class="grid-inputs">
                        <div class="form-group full">
                            <label>Alamat Lengkap GOR</label>
                            <textarea rows="3" placeholder="Jl. Raya Utama No. 123..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Kota / Kabupaten</label>
                            <input type="text" placeholder="Contoh: Surabaya">
                        </div>
                        <div class="form-group">
                            <label>Link Google Maps (Opsional)</label>
                            <input type="url" placeholder="https://maps.google.com/...">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Fasilitas -->
                <div class="form-section">
                    <div class="section-title">
                        <i class="fa-solid fa-star"></i> Fasilitas & Lapangan
                    </div>
                    <div class="grid-inputs" style="margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Jumlah Lapangan</label>
                            <input type="number" min="1" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Jenis Lantai</label>
                            <select>
                                <option>Vinyl (Standard BWF)</option>
                                <option>Parquet / Kayu</option>
                                <option>Semen / Beton</option>
                                <option>Karpet Biasa</option>
                            </select>
                        </div>
                    </div>
                    
                    <label style="margin-bottom: 15px; display: block;">Fasilitas Tersedia:</label>
                    <div class="facility-grid">
                        <div class="facility-item">
                            <input type="checkbox" id="f1">
                            <label for="f1" class="facility-label"><i class="fa-solid fa-wifi"></i> WiFi</label>
                        </div>
                        <div class="facility-item">
                            <input type="checkbox" id="f2">
                            <label for="f2" class="facility-label"><i class="fa-solid fa-car"></i> Parkir Luas</label>
                        </div>
                        <div class="facility-item">
                            <input type="checkbox" id="f3">
                            <label for="f3" class="facility-label"><i class="fa-solid fa-faucet-detergent"></i> Ruang Ganti</label>
                        </div>
                        <div class="facility-item">
                            <input type="checkbox" id="f4">
                            <label for="f4" class="facility-label"><i class="fa-solid fa-utensils"></i> Kantin</label>
                        </div>
                        <div class="facility-item">
                            <input type="checkbox" id="f5">
                            <label for="f5" class="facility-label"><i class="fa-solid fa-mosque"></i> Mushola</label>
                        </div>
                        <div class="facility-item">
                            <input type="checkbox" id="f6">
                            <label for="f6" class="facility-label"><i class="fa-solid fa-shower"></i> Shower Area</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit-reg">
                    Daftarkan Sekarang <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Footer Simple -->
    <footer class="footer" style="padding: 40px 0;">
        <div class="container" style="text-align: center; color: #555; font-size: 14px;">
            <p>&copy; 2026 Minton Partnership Program. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
